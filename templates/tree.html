{% extends "base.html" %}
{% block title %}Stammbaum – {{ person.full_name }}{% endblock %}

{% block head %}
<style>
  .tree-container { width: 100%; overflow: auto; }
  #tree-svg { display: block; }
  .tree-controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  .tree-mode-btn { padding: 0.4rem 1rem; border: 2px solid var(--primary); border-radius: 2rem;
    background: transparent; color: var(--primary); cursor: pointer; font-size: 0.9rem; transition: all 0.15s; }
  .tree-mode-btn.active { background: var(--primary); color: #fff; }
  .gen-label { font-size: 0.85rem; color: var(--text-muted); }
  input[type=range] { accent-color: var(--primary); }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <a class="back-link" href="/person/{{ person.id|replace('@','') }}">← {{ person.full_name }}</a>
    <h1>Stammbaum</h1>
  </div>
</div>

<div class="tree-controls">
  <button class="tree-mode-btn active" id="btn-ancestors" onclick="switchMode('ancestors')">⬆ Vorfahren</button>
  <button class="tree-mode-btn" id="btn-descendants" onclick="switchMode('descendants')">⬇ Nachfahren</button>
  <label class="gen-label">
    Generationen:
    <input type="range" id="gen-slider" min="2" max="7" value="4" oninput="updateGen(this.value)">
    <span id="gen-val">4</span>
  </label>
</div>

<div class="tree-container">
  <svg id="tree-svg"></svg>
</div>
{% endblock %}

{% block scripts %}
<script>
const ROOT_ID = "{{ person.id }}";
let currentMode = 'ancestors';
let currentGen = 4;

const COLORS = { M: '#3b82f6', F: '#ec4899', U: '#6b7280' };
const BOX_W = 160, BOX_H = 60, H_GAP = 40, V_GAP = 20;

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('btn-ancestors').classList.toggle('active', mode === 'ancestors');
  document.getElementById('btn-descendants').classList.toggle('active', mode === 'descendants');
  loadTree();
}

function updateGen(val) {
  document.getElementById('gen-val').textContent = val;
  currentGen = parseInt(val);
  loadTree();
}

async function loadTree() {
  const pidClean = ROOT_ID.replace(/@/g, '');
  const url = currentMode === 'ancestors'
    ? `/api/ancestors/${pidClean}?gen=${currentGen}`
    : `/api/descendants/${pidClean}?gen=${currentGen}`;
  const res = await fetch(url);
  const data = await res.json();
  if (currentMode === 'ancestors') renderAncestors(data);
  else renderDescendants(data);
}

/* ── Ancestor pedigree chart ── */
function renderAncestors(root) {
  const nodes = [];
  const links = [];

  function collect(node, x, y) {
    if (!node) return;
    node._x = x; node._y = y;
    nodes.push(node);
    const nextX = x + BOX_W + H_GAP;
    const span = Math.pow(2, node.generation - 1) * (BOX_H + V_GAP);
    if (node.father) {
      node.father._parent = node;
      collect(node.father, nextX, y - span / 2);
      links.push([node, node.father]);
    }
    if (node.mother) {
      node.mother._parent = node;
      collect(node.mother, nextX, y + span / 2);
      links.push([node, node.mother]);
    }
  }

  collect(root, 20, 0);

  const minY = Math.min(...nodes.map(n => n._y));
  const maxY = Math.max(...nodes.map(n => n._y));
  const maxX = Math.max(...nodes.map(n => n._x));
  const svgH = maxY - minY + BOX_H + 40;
  const svgW = maxX + BOX_W + 20;

  const offsetY = -minY + 20;
  nodes.forEach(n => n._y += offsetY);

  drawSVG(svgW, svgH, nodes, links);
}

/* ── Descendant tree ── */
function renderDescendants(root) {
  // Layout: top-down tree
  const nodes = [];
  const links = [];

  function countLeaves(node) {
    if (!node.children || node.children.length === 0) return 1;
    return node.children.reduce((s, c) => s + countLeaves(c), 0);
  }

  function layout(node, depth, startLeaf) {
    const leaves = countLeaves(node);
    node._y = depth * (BOX_H + V_GAP + 20);
    node._leafStart = startLeaf;
    node._leaves = leaves;
    nodes.push(node);

    let cur = startLeaf;
    if (node.children) {
      node.children.forEach(child => {
        layout(child, depth + 1, cur);
        links.push([node, child]);
        cur += countLeaves(child);
      });
    }
    node._x = (startLeaf + leaves / 2) * (BOX_W + H_GAP / 2) - BOX_W / 2;
  }

  layout(root, 0, 0);

  const maxX = Math.max(...nodes.map(n => n._x));
  const maxY = Math.max(...nodes.map(n => n._y));
  drawSVG(maxX + BOX_W + 20, maxY + BOX_H + 20, nodes, links, true);
}

function drawSVG(w, h, nodes, links, vertical = false) {
  const svg = document.getElementById('tree-svg');
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

  let html = '';

  // Draw links
  links.forEach(([a, b]) => {
    const ax = a._x + BOX_W / 2, ay = a._y + BOX_H / 2;
    const bx = b._x + BOX_W / 2, by = b._y + BOX_H / 2;
    const mx = (ax + bx) / 2;
    html += `<path d="M${ax},${ay} C${mx},${ay} ${mx},${by} ${bx},${by}"
      fill="none" stroke="#cbd5e1" stroke-width="2"/>`;
  });

  // Draw boxes
  nodes.forEach(node => {
    const x = node._x, y = node._y;
    const color = COLORS[node.sex] || COLORS.U;
    const pidClean = node.id.replace(/@/g, '');
    const isRoot = node.id === ROOT_ID;
    const stroke = isRoot ? '#f59e0b' : color;
    const sw = isRoot ? 3 : 1.5;

    html += `<g class="tree-node" onclick="window.location='/person/${pidClean}'" style="cursor:pointer">`;
    html += `<rect x="${x}" y="${y}" width="${BOX_W}" height="${BOX_H}"
      rx="8" ry="8" fill="white" stroke="${stroke}" stroke-width="${sw}"
      filter="url(#shadow)"/>`;

    // Top colored bar
    html += `<rect x="${x}" y="${y}" width="${BOX_W}" height="5" rx="4" fill="${color}"/>`;
    html += `<rect x="${x}" y="${y+1}" width="${BOX_W}" height="4" fill="${color}"/>`;

    // Name (wrap if needed)
    const name = node.name.length > 20 ? node.name.substring(0, 19) + '…' : node.name;
    html += `<text x="${x + BOX_W/2}" y="${y + 25}" text-anchor="middle"
      font-size="12" font-weight="600" fill="#1e293b" font-family="system-ui">${escXml(name)}</text>`;

    if (node.short_life) {
      html += `<text x="${x + BOX_W/2}" y="${y + 42}" text-anchor="middle"
        font-size="10" fill="#64748b" font-family="system-ui">${escXml(node.short_life)}</text>`;
    }

    // Hover rect (transparent, for cursor)
    html += `<rect x="${x}" y="${y}" width="${BOX_W}" height="${BOX_H}" rx="8" fill="transparent"/>`;
    html += `</g>`;
  });

  svg.innerHTML = `<defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>` + html;
}

function escXml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Initial load
loadTree();
</script>
{% endblock %}
